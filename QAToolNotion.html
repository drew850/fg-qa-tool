// All external calls go through the local Python proxy (start.py)
// so there are no CORS issues regardless of how the file is served.
const PROXY = window.location.origin + "/proxy";

async function proxyFetch(targetUrl, method, headers, body) {
  // Send API keys in the body wrapper so they don't get blocked by CORS preflight
  const res = await fetch(PROXY + "?url=" + encodeURIComponent(targetUrl), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      _method: method || "GET",
      _headers: headers,
      _body: body
    })
  });
  if (!res.ok) {
    const txt = await res.text().catch(() => "");
    throw new Error("Request failed " + res.status + ": " + txt.slice(0, 200));
  }
  return res.json();
}

async function notionAPI(path, method, body) {
  return proxyFetch(
    "https://api.notion.com" + path,
    method || "GET",
    {
      "Authorization": "Bearer " + NOTION_TOKEN,
      "Notion-Version": NOTION_VERSION,
    },
    body
  );
}

async function callClaude(prompt) {
  const data = await proxyFetch(
    "https://api.anthropic.com/v1/messages",
    "POST",
    { "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01" },
    { model: "claude-haiku-4-5-20251001", max_tokens: 4000, messages: [{ role: "user", content: prompt }] }
  );
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

// Use Sonnet for insights — much better analysis quality, worth the extra cost
async function callClaudeInsights(prompt) {
  const data = await proxyFetch(
    "https://api.anthropic.com/v1/messages",
    "POST",
    { "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01" },
    { model: "claude-sonnet-4-5", max_tokens: 8000, messages: [{ role: "user", content: prompt }] }
  );
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
}

// Retry on 429 rate limit with exponential backoff
async function callClaudeWithRetry(prompt, maxRetries=4) {
  for (var attempt=0; attempt<=maxRetries; attempt++) {
    try {
      return await callClaude(prompt);
    } catch(e) {
      var is429 = e.message && e.message.includes("429");
      if (is429 && attempt < maxRetries) {
        var wait = Math.pow(2, attempt) * 15000; // 15s, 30s, 60s, 120s
        console.log("[QA] Rate limited, waiting " + (wait/1000) + "s...");
        await new Promise(function(r){setTimeout(r, wait);});
      } else {
        throw e;
      }
    }
  }
}


async function loadTicketsFromNotion(dbId, onStatus) {
  const log = (msg) => { console.log("[QA]", msg); if(onStatus) onStatus(msg); };
  log("Querying Notion database...");

  const pages = [];
  let cursor = undefined, hasMore = true;
  while (hasMore) {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const data = await notionAPI(`/v1/databases/${dbId}/query`, "POST", body);
    pages.push(...(data.results || []));
    hasMore = data.has_more || false;
    cursor = data.next_cursor;
    log("Fetched " + pages.length + " tickets...");
  }

  log("Parsing " + pages.length + " tickets");
  return pages.map(page => parseNotionRow({
    pageId: page.id,
    ticketId: getProp(page,"Ticket ID")||"", agentName: getProp(page,"Agent")||"",
    reviewer: getProp(page,"Auditor")||"", week: getProp(page,"Week")||"",
    createdDate: getProp(page,"Created Date")||"", contactReason: getProp(page,"Contact Reason")||"",
    subject: getProp(page,"Subject")||"", ticketUrl: getProp(page,"Ticket URL")||"",
    aiScore: getProp(page,"AI Score")??0, finalScore: getProp(page,"Final Score")??0,
    aiPassed: getProp(page,"AI Passed")??false, finalPassed: getProp(page,"Final Passed")??false,
    reviewed:      getProp(page,"Reviewed")??false,
    reviewedBy:    getProp(page,"Reviewed By")||"",
    reviewedAt:    getProp(page,"Reviewed At")||"",
    reviewerNotes: getProp(page,"Reviewer Notes")||"",
    scoresJSON: getProp(page,"Scores JSON")||"{}", disputesJSON: getProp(page,"Disputes JSON")||"{}",
    justificationsJSON: getProp(page,"Justifications JSON")||"{}",
    ctfNotes:      getProp(page,"CTF Notes")||"",
    empathyNotes:  getProp(page,"Empathy Notes")||"",
    fcrNotes:      getProp(page,"FCR Notes")||"",
    productNotes:  getProp(page,"Product Notes")||"",
    orderNotes:    getProp(page,"Order Notes")||"",
    returnsNotes:  getProp(page,"Returns Notes")||"",
    promoNotes:    getProp(page,"Promo Notes")||"",
    retentionNotes:getProp(page,"Retention Notes")||"",
    comments: getProp(page,"Comments")||"", transcript: getProp(page,"Transcript")||"",
    autofailsJSON: getProp(page,"Autofails JSON")||"[]", savedAt: getProp(page,"Saved At")||"",
  }));
}

async function loadConfigFromNotion(dbId, key) {
  try {
    const data = await notionAPI(`/v1/databases/${dbId}/query`, "POST", {
      filter: { property: "Key", rich_text: { equals: key } }, page_size: 1
    });
    const page = data.results?.[0];
    if (!page) return null;
    const val = getProp(page, "Value") || "";
    return val ? JSON.parse(val) : null;
  } catch(e) { console.error("[QA] loadConfig:", e); return null; }
}

async function saveConfigToNotion(dbId, key, value) {
  const json = JSON.stringify(value).slice(0, 1900);
  const find = await notionAPI(`/v1/databases/${dbId}/query`, "POST", {
    filter: { property: "Key", rich_text: { equals: key } }, page_size: 1
  });
  const existing = find.results?.[0];
  const props = {
    "Key":   { title: [{ text: { content: key } }] },
    "Value": { rich_text: [{ text: { content: json } }] }
  };
  if (existing) {
    await notionAPI(`/v1/pages/${existing.id}`, "PATCH", { properties: props });
  } else {
    await notionAPI("/v1/pages", "POST", { parent: { database_id: dbId }, properties: props });
  }
}

function getProp(page, name) {
  const p = page.properties?.[name];
  if (!p) return null;
  switch (p.type) {
    case "title":     return p.title?.map(t => t.plain_text).join("") || "";
    case "rich_text": return p.rich_text?.map(t => t.plain_text).join("") || "";
    case "number":    return p.number ?? null;
    case "checkbox":  return p.checkbox ?? false;
    case "url":       return p.url || "";
    default:          return null;
  }
}

function tryParseJSON(txt) {
  if (!txt) return null;
  try { return JSON.parse(txt); } catch(e) {}
  const cb = txt.match(/```(?:json)?\s*([\s\S]+?)```/);
  if (cb) { try { return JSON.parse(cb[1].trim()); } catch(e) {} }
  const arr = txt.match(/\[[\s\S]{10,}\]/);
  if (arr) { try { return JSON.parse(arr[0]); } catch(e) {} }
  const obj = txt.match(/\{[\s\S]{10,}\}/);
  if (obj) { try { return JSON.parse(obj[0]); } catch(e) {} }
  return null;
}

function parseNotionRow(r) {
  let aiScores = {}, disputes = {}, justifications = {}, autofails = [];
  try { aiScores = JSON.parse(r.scoresJSON || r["Scores JSON"] || "{}"); } catch(e) {}
  try { disputes = JSON.parse((r.disputesJSON||r["Disputes JSON"]||"").replace(/'/g,'"')); } catch(e) {}
  try {
    var rawJust = JSON.parse(r.justificationsJSON || r["Justifications JSON"] || "{}");
    // Handle both compressed format {r,i} and full format {reason,improve}
    Object.entries(rawJust).forEach(function(e){
      var k=e[0],v=e[1];
      if(v&&typeof v==="object"){
        justifications[k]={
          reason: v.reason||v.r||"",
          improve: v.improve||v.i||null,
          sample: v.sample||null
        };
      }
    });
  } catch(e) {}
  // Override with per-category notes fields if present (full text, no truncation)
  var catNoteMap={
    ctf:"ctfNotes",empathy:"empathyNotes",fcr:"fcrNotes",product:"productNotes",
    order:"orderNotes",returns:"returnsNotes",promo:"promoNotes",retention:"retentionNotes"
  };
  Object.entries(catNoteMap).forEach(function(e){
    var catId=e[0], field=e[1];
    var raw=r[field]||r[field.replace(/([A-Z])/g," $1").replace(/^./,function(s){return s.toUpperCase();})+""]||"";
    if(raw){
      var parts=raw.split(" | ↑ ");
      justifications[catId]={
        reason: parts[0]||"",
        improve: parts[1]||null,
        sample: null
      };
    }
  });
  try { autofails = JSON.parse((r.autofailsJSON||r["Autofails JSON"]||"").replace(/'/g,'"')); } catch(e) {}
  // Support both camelCase (our mapped names) and "Title Case" (direct Notion field names)
  const ticketId  = r.ticketId  || r["Ticket ID"]  || r.title || "";
  const agentName = r.agentName || r["Agent"]       || r.agent || "";
  const reviewer  = r.reviewer  || r["Auditor"]     || r.auditor || "";
  const aiScore   = parseFloat(r.aiScore    ?? r["AI Score"]    ?? 0) || 0;
  const finalScore= parseFloat(r.finalScore ?? r["Final Score"] ?? aiScore) || 0;
  return {
    id: r.pageId || r.id || ticketId,
    notionPageId: r.pageId || r.id || null,
    ticketId,
    agentName,
    reviewer,
    week:          r.week         || r["Week"]          || "",
    createdDate:   r.createdDate  || r["Created Date"]  || "",
    contactReason: r.contactReason|| r["Contact Reason"]|| "",
    subject:       r.subject      || r["Subject"]       || "",
    ticketUrl:     r.ticketUrl    || r["Ticket URL"]    || "",
    aiScore,
    finalScore,
    passed:         !!(r.aiPassed    ?? r["AI Passed"]    ?? false),
    disputedPassed: !!(r.finalPassed ?? r["Final Passed"] ?? false),
    hasDisputes:    !!(r.hasDisputes ?? r["Has Disputes"] ?? false),
    reviewed:       !!(r.reviewed ?? r["Reviewed"] ?? false),
    reviewedBy:     r.reviewedBy || r["Reviewed By"] || "",
    reviewedAt:     r.reviewedAt || r["Reviewed At"] || "",
    reviewerNotes:  r.reviewerNotes || r["Reviewer Notes"] || "",
    autofail:       !!(r.autofail    ?? r["Autofail"]     ?? false),
    aiScores, scores: aiScores, disputes, justifications,
    comments:  r.comments  || r["Comments"]  || "",
    transcript: r.transcript || r["Transcript"] || "",
    autofails,
    savedAt: r.savedAt || r["Saved At"] || ""
  };
}



function makeDefaultCtf() { return { contactReasons:[], products:[], resolutions:[] }; }
function downloadBlob(content,filename,type) {
  var blob=new Blob([content],{type});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

function AgentInsightRow({a, ats, matrix, scoreTone, scoreColor, T, resultBadge, sectionLabel}) {
  const [open, setOpen] = useState(false);
  const avg = Math.round(ats.reduce(function(s,t){return s+t.finalScore;},0)/ats.length);
  const pr  = Math.round(ats.filter(function(t){return t.passed;}).length/ats.length*100);
  const afs = ats.filter(function(t){return t.autofail;}).length;
  const tone = scoreTone(avg);
  function catLbl(val){if(!val||val==="NA")return null;var v=val.toUpperCase();if(v.startsWith("YES"))return "Pass";if(v.startsWith("PARTIAL"))return "Partial";if(v.startsWith("NO"))return "Miss";return null;}
  return(
    <div style={{border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",marginBottom:"6px",overflow:"hidden"}}>
      <div onClick={function(){setOpen(!open);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer",background:open?"var(--color-background-secondary)":"transparent",userSelect:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
          <span style={{fontSize:"13px",fontWeight:500}}>{a}</span>
          <span style={{fontSize:"11px",color:"var(--color-text-secondary)"}}>{ats.length} tickets</span>
          {afs>0&&<span style={{fontSize:"10px",fontWeight:700,padding:"1px 6px",borderRadius:"3px",background:T.red.bg,color:T.red.text,border:"1px solid "+T.red.border}}>{afs} autofail{afs!==1?"s":""}</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <span style={{fontSize:"13px",fontWeight:700,color:tone.text}}>{avg}%</span>
          <span style={{fontSize:"11px",color:"var(--color-text-secondary)"}}>{pr}% pass</span>
          <span style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"12px 14px",borderTop:"0.5px solid var(--color-border-tertiary)"}}>
          <div style={{marginBottom:"12px"}}>
            {matrix.map(function(c){
              var app=ats.filter(function(t){var v=(t.scores&&t.scores[c.id])||"";return v&&v!=="NA";});
              if(!app.length)return null;
              var pass=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Pass";}).length;
              var pct=Math.round(pass/app.length*100);
              var tone2=scoreTone(pct);
              return <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                <span style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{c.label}</span>
                <span style={{fontSize:"12px",fontWeight:600,color:tone2.text}}>{pct}%</span>
              </div>;
            }).filter(Boolean)}
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>

function parseScoreVal(val) {
  if (!val || val === "NA") return null;
  const m = val.match(/\(([\d.]+)\)/);
  return m ? parseFloat(m[1]) : null;
}
function calcScore(scores, matrix) {
  let pts = 0, max = 0;
  matrix.forEach(c => {
    const v = scores[c.id];
    if (!v || v === "NA") return;
    const sv = parseScoreVal(v);
    if (sv !== null) { pts += sv; max += c.max; }
  });
  return max === 0 ? null : { pts, max, pct: Math.round((pts / max) * 100) };
}
function calcDisputedScore(ticket, matrix) {
  const merged = {};
  matrix.forEach(c => {
    const d = ticket.disputes && ticket.disputes[c.id];
    merged[c.id] = d ? d.finalScore : ((ticket.aiScores && ticket.aiScores[c.id]) || "");
  });
  return calcScore(merged, matrix);
}
function scoreLabel(val) {
  if (!val || val === "NA") return null;
  const v = val.toUpperCase();
  if (v.startsWith("YES")) return "Pass";
  if (v.startsWith("PARTIAL")) return "Partial";
  if (v.startsWith("NO")) return "Miss";
  return null;
}
function getWeek() {
  const now = new Date(), start = new Date(now);
  start.setDate(now.getDate() - now.getDay() + 1);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  const fmt = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return fmt(start) + " - " + fmt(end) + " " + now.getFullYear();
}
function ticketWeekLabel(createdDate) {
  if (!createdDate) return "";
  const d = new Date(createdDate);
  if (isNaN(d.getTime())) return "";
  const start = new Date(d);
  const day = start.getDay() || 7;
  start.setDate(start.getDate() - day + 1);
  const end = new Date(start); end.setDate(start.getDate() + 6);
  const fmt = dt => dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  return fmt(start) + " - " + fmt(end) + " " + d.getFullYear();
}

// ── CSV PARSER ───────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  return lines.slice(1).map(line => {
    const vals = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else cur += line[i];
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  });
}
function mapRow(row) {
  const url = row["ticket_url"] || row["Ticket URL"] || "";
  const directId = row["ticket_id"] || row["Ticket ID"] || "";
  const rawId = directId ? String(directId).trim().replace(/^=?"?|"?$/g, "") : (url.match(/(\d+)\/?$/) || [])[1] || url;
  const cr1 = row["contact_reason_l1"] || "", cr2 = row["contact_reason_l2"] || "";
  const contactReason = cr1 && cr2 && cr2 !== "N/A" ? cr1 + "::" + cr2 : cr1 || row["subject"] || "";
  const p1 = row["product_l1"] || "", p2 = row["product_l2"] || "";
  const r1 = row["ticket_resolution_l1"] || "", r2 = row["ticket_resolution_l2"] || "";
  const ar1 = row["additional_resolution_l1"] || "", ar2 = row["additional_resolution_l2"] || "";
  return {
    ticketId: String(rawId).trim(),
    ticketUrl: url,
    subject: row["subject"] || row["Subject"] || "",
    status: row["status"] || "",
    agentName: row["agent"] || row["Agent"] || "",
    createdDate: row["created_date"] || row["Created Date"] || "",
    closedDate: row["closed_date"] || "",
    customerEmail: row["customer_email"] || "",
    customerName: row["customer_name"] || "",
    contactReason,
    contactReasonL1: cr1, contactReasonL2: cr2,
    productL1: p1, productL2: p2,
    resolutionL1: r1, resolutionL2: r2,
    addResolutionL1: ar1, addResolutionL2: ar2,
    messageCount: parseInt(row["message_count"] || "0") || 0,
    transcript: row["transcript"] || "",
    initialChannel: row["initial_channel"] || ""
  };
}

function formatNotes(justifications, catId) {
  var j = justifications && justifications[catId];
  if (!j) return "";
  var out = j.reason || j.r || "";
  var imp = j.improve || j.i || "";
  if (imp && imp !== "null") out += " | ↑ " + imp;
  return out.slice(0, 1990);
}

  function buildEvalPrompt(ticket) {
    var scoreOptions=matrix.map(function(c){return c.levels.map(function(l){return l.points!==null?l.level+" ("+l.points+")":l.level;}).join("|");});
    var rubric=matrix.map(function(c,i){return c.label+" ["+scoreOptions[i]+"]: "+c.levels.map(function(l){return l.level+"="+l.definition;}).join(" | ");}).join("\n");
    var afLines=autofailList.map(function(a,i){return (i+1)+". "+a;}).join("\n");
    var scoresSchema=matrix.map(function(c,i){return '"'+c.id+'":"'+scoreOptions[i]+'"';}).join(",");
    var justSchema=matrix.map(function(c){return '"'+c.id+'":{"reason":"1-2 sentences","improve":"1 sentence or null"}';}).join(",");
    var cleanTranscript = (ticket.transcript||"")
      .slice(0,8000)
      .replace(/â€™/g,"'").replace(/â€˜/g,"'")
      .replace(/â€œ/g,'"').replace(/â€/g,'"')
      .replace(/â€"/g,"—").replace(/â€"/g,"–").replace(/â€¦/g,"...");
    return "You are a QA evaluator for Freedom Grooming customer support.\n\n"
      +"ENCODING NOTE: The transcript may contain mojibake encoding artifacts (e.g. â€™ â€œ). "
      +"Interpret these as their intended characters (smart quotes, apostrophes) and evaluate normally.\n\n"
      +"IMPORTANT CONTEXT:\n"
      +"- Freedom Grooming uses Jamie as their AI customer service agent — Jamie IS the agent being evaluated\n"
      +"- Gorgias Bot sends only the auto-acknowledgment reply — do NOT evaluate Gorgias Bot\n"
      +"- Yuma is an escalation system — do NOT evaluate Yuma messages\n"
      +"- The AGENT to evaluate is: "+ticket.agentName+"\n"
      +"- If "+ticket.agentName+" has replied in the transcript, evaluate their response\n"
      +"- Score NA only when a category genuinely does not apply (e.g. no order cancellation = NA for that category)\n"
      +"- If the agent named above has NOT replied yet, score all categories NA except CTF\n"
      +"- Score based on what IS in the transcript\n"
      +"CATEGORIES:\n"+rubric+"\n\n"
      +"AUTOFAILS:\n"+afLines+"\n\n"
      +"TICKET ID: "+ticket.ticketId+"\n"
      +"AGENT: "+ticket.agentName+"\n"
      +"SUBJECT: "+ticket.contactReason+"\n\n"
      +"TICKET FIELD VALUES (already tagged by agent — use these to evaluate CTF Accuracy):\n"
      +"  Contact Reason: "+(ticket.contactReason||"not tagged")+"\n"
      +"  Product: "+((ticket.productL1&&ticket.productL2&&ticket.productL2!=="N/A")?ticket.productL1+"::"+ticket.productL2:ticket.productL1||"not tagged")+"\n"
      +"  Ticket Resolution: "+((ticket.resolutionL1&&ticket.resolutionL2&&ticket.resolutionL2!=="N/A")?ticket.resolutionL1+"::"+ticket.resolutionL2:ticket.resolutionL1||"not tagged")+"\n"
      +"  Additional Resolution: "+((ticket.addResolutionL1&&ticket.addResolutionL2&&ticket.addResolutionL2!=="N/A")?ticket.addResolutionL1+"::"+ticket.addResolutionL2:ticket.addResolutionL1||"not tagged")+"\n\n"
      +"TRANSCRIPT:\n"+cleanTranscript+"\n\n"
      +'Respond ONLY with JSON: {"meta":{"contactReason":"...","product":"...","ticketResolution":"...","returnOrRefund":"..."},'
      +'"scores":{'+scoresSchema+'},'
      +'"justifications":{'+justSchema+'},'
      +'"autofails":[],'
      +'"comments":"+strength\\n-improvement"}';
  }

  async function runBatchQA() {
    if(!batchTickets.length)return;
    setBatchRunning(true);batchStopRef.current=false;batchPausedRef.current=false;setBatchPaused(false);

    // Build set of already-evaluated ticket IDs (from Notion DB + current batch results)
    var alreadyDone=new Set(
      tickets.map(function(t){return String(t.ticketId);})
        .concat(batchResults.filter(function(r){return !r.error;}).map(function(r){return String(r.ticketId);}))
    );

    var results=[...batchResults];
    var startIdx=results.length;
    var skipped=0;
    for(var i=startIdx;i<batchTickets.length;i++){
      if(batchStopRef.current){setBatchStatus("Stopped at ticket "+(i+1)+".");break;}
      while(batchPausedRef.current){await new Promise(function(r){setTimeout(r,500);});}
      var ticket=batchTickets[i];

      // Skip if already evaluated
      if(alreadyDone.has(String(ticket.ticketId))){
        skipped++;
        setBatchStatus("Skipping #"+ticket.ticketId+" — already evaluated ("+skipped+" skipped so far)");
        setBatchResults([...results]);
        continue;
      }
      alreadyDone.add(String(ticket.ticketId)); // prevent dupes within same batch

      var transcriptLen = (ticket.transcript||"").trim().length;
      setBatchStatus("Evaluating "+(i+1)+" of "+batchTickets.length+" — #"+ticket.ticketId+" ("+transcriptLen+" chars)"+(skipped?" · "+skipped+" skipped":""));
      if (!ticket.transcript || ticket.transcript.trim().length < 20) {
        results=[...results,{ticketId:ticket.ticketId,agentName:ticket.agentName,error:"No transcript found in CSV",finalScore:0,passed:false,autofail:false,week}];
        setBatchResults([...results]);
        continue;
      }
      var newResult=null;
      try {
        var rawTxt=await callClaudeWithRetry(buildEvalPrompt(ticket));
        var cleanTxt=rawTxt.replace(/```(?:json)?\s*/g,"").replace(/```/g,"").trim();
        var jsonMatch=cleanTxt.match(/\{[\s\S]+\}/);
        if(!jsonMatch)throw new Error("No JSON in response");
        var parsed=JSON.parse(jsonMatch[0]);
        var sc=calcScore(parsed.scores||{},matrix);
        var hasAF=(parsed.autofails||[]).length>0;
        newResult={
          id:Date.now()+i,week:ticketWeekLabel(ticket.createdDate)||week,auditWeek:week,
          reviewer:ticket.reviewer||activeAuditor||"Batch QA",
          agentName:ticket.agentName,ticketId:String(ticket.ticketId),ticketUrl:ticket.ticketUrl,
          createdDate:ticket.createdDate||"",
          contactReason:parsed.meta?.contactReason||ticket.contactReason,
          product:parsed.meta?.product||"",ticketResolution:parsed.meta?.ticketResolution||"",
          scores:parsed.scores||{},aiScores:parsed.scores||{},
          autofails:parsed.autofails||[],autofail:hasAF,
          comments:parsed.comments||"",
          totalPoints:sc?sc.pts:0,maxPoints:sc?sc.max:0,
          finalScore:sc?sc.pct:0,aiScore:sc?sc.pct:0,
          passed:!hasAF&&(sc?sc.pct:0)>=85,
          hasDisputes:false,disputes:{},
          justifications:parsed.justifications||{},
          customerEmail:ticket.customerEmail,
          savedAt:new Date().toISOString(),
        };
        // Save to Notion immediately
        setBatchStatus("Saving #"+ticket.ticketId+" to Notion...");
        try {
          await saveTicketToNotion(TICKETS_DB_ID, newResult);
          setTickets(function(prev){return prev.concat([newResult]);});
        } catch(saveErr) {
          console.error("Save failed for",ticket.ticketId,saveErr);
          newResult._saveError=saveErr.message;
        }
        results=[...results,newResult];
      } catch(err){
        results=[...results,{ticketId:ticket.ticketId,agentName:ticket.agentName,error:err.message,finalScore:0,passed:false,autofail:false,week}];
      }
      setBatchResults([...results]);
      // Free tier: 5 req/min. Wait 13s between tickets, show countdown.
      if(i < batchTickets.length-1 && !batchStopRef.current) {
        for(var s=13; s>0; s--) {
          if(batchStopRef.current) break;
          setBatchStatus("Waiting "+s+"s before next ticket (free tier rate limit)...");
          await new Promise(function(r){setTimeout(r,1000);});
        }
      }
    }
    setBatchRunning(false);
    if(!batchStopRef.current){
      var evalCount=results.filter(function(r){return !r.error&&!r._saveError;}).length;
      var saveErrors=results.filter(function(r){return r._saveError;}).length;
      var msg="Done! "+evalCount+" tickets evaluated and saved"+(skipped>0?" · "+skipped+" skipped":"")+(saveErrors>0?" · "+saveErrors+" save errors":"");
      setBatchStatus(msg);
      addToast(evalCount+" tickets saved to Notion"+(saveErrors>0?" ("+saveErrors+" save errors)":""));
      setTimeout(function(){
        setBatchTickets([]);setBatchResults([]);setBatchStatus("");
        setView("dashboard");
      },2000);
    }
  }

  async function saveBatchToDatabase() {

    }

  function buildTeamInsightHTML(fromVal, toVal) {

    var totalAutofails=filtered.filter(function(t){return t.autofail;}).length;
    var totalDisputed=filtered.filter(function(t){return t.hasDisputes;}).length;
    var teamAvg=Math.round(filtered.reduce(function(s,t){return s+t.finalScore;},0)/totalTickets);

    function sc(pct){if(pct>=90)return{t:"#166534",bg:"#f0fdf4",b:"#bbf7d0"};if(pct>=75)return{t:"#92400e",bg:"#fffbeb",b:"#fde68a"};return{t:"#991b1b",bg:"#fee2e2",b:"#fecaca"};}

  async function generateAIInsights(fromVal, toVal) {
    var filtered=tickets.filter(function(t){
      var created=(t.createdDate||"").slice(0,10);
      if(fromVal&&created&&created<fromVal)return false;
      if(toVal&&created&&created>toVal)return false;
      return true;
    });
    if(!filtered.length){addToast("No tickets in date range","error");return;}
    setAiInsightsLoading(true);setAiInsights(null);setAiInsightsError("");

    // Build compact data summary for Claude
    var allAgents=[...new Set(filtered.map(function(t){return t.agentName;}).filter(Boolean))].sort();
    var teamAvg=Math.round(filtered.reduce(function(s,t){return s+t.finalScore;},0)/filtered.length);
    var passRate=Math.round(filtered.filter(function(t){return t.passed;}).length/filtered.length*100);
    var autofails=filtered.filter(function(t){return t.autofail;}).length;
    var disputed=filtered.filter(function(t){return t.hasDisputes;}).length;

    function catLbl(val){if(!val||val==="NA")return null;var v=val.toUpperCase();if(v.startsWith("YES"))return "Pass";if(v.startsWith("PARTIAL"))return "Partial";if(v.startsWith("NO"))return "Miss";return null;}

    var catStats=matrix.map(function(c){
      var app=filtered.filter(function(t){var v=(t.scores&&t.scores[c.id])||"";return v&&v!=="NA";});
      if(!app.length)return null;
      var pass=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Pass";}).length;
      var partial=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Partial";}).length;
      var miss=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Miss";}).length;
      return c.label+": "+Math.round(pass/app.length*100)+"% pass ("+pass+"P·"+partial+"Pt·"+miss+"M of "+app.length+")";
    }).filter(Boolean).join("\n");

    var agentStats=allAgents.map(function(a){
      var ats=filtered.filter(function(t){return t.agentName===a;});
      var avg=Math.round(ats.reduce(function(s,t){return s+t.finalScore;},0)/ats.length);
      var pr=Math.round(ats.filter(function(t){return t.passed;}).length/ats.length*100);
      var afs=ats.filter(function(t){return t.autofail;}).length;
      var disp=ats.filter(function(t){return t.hasDisputes;}).length;
      return a+": avg="+avg+"% pass="+pr+"% tickets="+ats.length+" autofails="+afs+" disputes="+disp;
    }).join("\n");

    // Contact reason breakdown
    var crMap={};
    filtered.forEach(function(t){
      var cr=(t.contactReason||"Unknown").split("::")[0].trim();
      if(!crMap[cr])crMap[cr]={total:0,pass:0};
      crMap[cr].total++;
      if(t.passed)crMap[cr].pass++;
    });
    var crStats=Object.entries(crMap).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e){
      return e[0]+": "+e[1].total+"t, "+Math.round(e[1].pass/e[1].total*100)+"% pass";
    }).join("\n");

    var dateLabel=fromVal&&toVal?fromVal+" to "+toVal:fromVal?"from "+fromVal:toVal?"to "+toVal:"all time";

    // Build per-ticket detail for deeper analysis
    var ticketDetail=filtered.map(function(t){
      var catScores=matrix.map(function(c){
        var v=(t.scores&&t.scores[c.id])||"NA";
        return c.id+":"+v;
      }).join(",");
      return "["+t.ticketId+"] agent="+t.agentName+" score="+t.finalScore+"% passed="+t.passed+" autofail="+t.autofail+" disputed="+t.hasDisputes+" cr="+t.contactReason+" | "+catScores;
    }).join("\n");

    var rubricSummary=matrix.map(function(c){return c.id+" ("+c.label+", max "+c.max+"pt)";}).join(", ");

    var prompt=`You are a senior QA analyst for Freedom Grooming, a subscription grooming brand. You are preparing a leadership briefing from QA ticket data. Your analysis must be specific, honest, and directly actionable — no generic advice.

BUSINESS CONTEXT:
- Freedom Grooming sells subscription grooming products
- Key contact reasons: cancellations, subscription changes, returns, troubleshooting, order issues
- Retention Effort is critical — failing to attempt retention on cancellation contacts is a direct revenue risk
- Pass threshold is 85%. Scores 75-84% are close misses that often indicate coaching opportunities
- Disputed scores suggest either calibration issues or agents who need rubric clarity

SCORING RUBRIC CATEGORIES: ${rubricSummary}
- CTF Accuracy: did the agent correctly tag contact reason/product/resolution (data quality)
- Empathy and Acknowledgment: tone and acknowledgment quality
- First Contact Resolution: did the agent resolve fully in one interaction
- Product Intelligence: correct product knowledge and guidance
- Order Cancellations and Changes: correct Shopify/ShipMonk workflow execution
- Returns and Replacements: correct return/replacement process with all options offered
- Promotion and Pricing Accuracy: correct promo/discount handling
- Retention Effort: did the agent attempt to save cancelling customers (CRITICAL for revenue)

PERIOD: ${dateLabel}
TEAM SUMMARY: ${filtered.length} tickets | ${allAgents.length} agents | avg ${teamAvg}% | ${passRate}% pass rate | ${autofails} autofails | ${disputed} disputed

CATEGORY PERFORMANCE (Pass% | Pass·Partial·Miss counts):
${catStats}

AGENT PERFORMANCE (avg% | pass% | tickets | autofails | disputes):
${agentStats}

CONTACT REASON PERFORMANCE:
${crStats}

INDIVIDUAL TICKET DATA:
${ticketDetail}

Analyze this data deeply. Look for patterns across agents and contact reasons. Identify the single biggest lever for improvement. Call out specific agents by name. Connect category scores to business outcomes (CSAT, revenue, churn).

Return ONLY valid JSON with this exact structure (no markdown, no extra text):
{
  "status": "needs_attention" | "on_track" | "strong",
  "headline": "One punchy, specific sentence — reference actual numbers or agent names",
  "summary": "3 sentences max. Lead with the most important finding. Be direct about what's broken and what's working. Reference specific percentages.",
  "recommendedFocus": "One concrete, specific action for this week. Not vague — tell them exactly what to do, who should be involved, and what outcome to expect.",
  "strengths": [
    {"title": "Specific strength title referencing a category or behavior", "detail": "2-3 sentences with exact numbers and business impact"}
  ],
  "gaps": [
    {"title": "Specific gap title — name the category or pattern", "detail": "2-3 sentences with exact numbers, which agents, and what the business risk is"}
  ],
  "quickWins": [
    {"action": "Very specific action — what exactly to do", "why": "Why this will move the needle, with reference to specific data", "effort": "Low"}
  ],
  "agentCallouts": [
    {"name": "Exact agent name", "type": "top" | "watch", "note": "1-2 specific sentences referencing their actual scores and patterns"}
  ],
  "contactReasonInsight": "2-3 sentences. Which contact reasons are performing best and worst? What does this tell us about agent training gaps or process issues? Connect to CSAT.",
  "contactReasonBreakdown": [
    {"reason": "contact reason name", "tickets": 0, "passRate": 0}
  ]
}

Rules:
- strengths: 2-3 items max
- gaps: 2-4 items, ordered by business impact (worst first)  
- quickWins: 2-3 items, all "Low" effort
- agentCallouts: top 2 performers + bottom 2 performers only, ordered top first then watch
- contactReasonBreakdown: all contact reasons from the data, sorted by passRate ascending
- Every field must reference actual data — no generic statements`;


    try {
      var raw=await callClaudeInsights(prompt);
      var clean=raw.replace(/```(?:json)?\s*/g,"").replace(/```/g,"").trim();
      var match=clean.match(/\{[\s\S]+\}/);
      if(!match)throw new Error("No JSON in response");

        (t.aiScore||t.finalScore)+"%",t.passed?"PASS":"FAIL",

  async function saveDispute() {
    if(!reviewSelected||!disputerName.trim()){addToast("Select your name first","error");return;}
    var pending=Object.entries(disputeState).filter(function(e){
      var d=e[1];return (d.newScore&&d.justification&&d.justification.trim())||d.removed;
    });
    if(!pending.length){addToast("No changes to save","error");return;}
    setSavingDispute(true);
    try {
      var updatedDisputes=Object.assign({},reviewSelected.disputes||{});
      pending.forEach(function(e){
        var catId=e[0],d=e[1];
        if(d.removed){delete updatedDisputes[catId];}
        else{updatedDisputes[catId]={finalScore:d.newScore,justification:d.justification.trim(),disputer:disputerName,disputedAt:new Date().toISOString()};}
      });
      var hasDisputes=Object.keys(updatedDisputes).length>0;
      var merged={};
      matrix.forEach(function(c){
        var disp=updatedDisputes[c.id];
        merged[c.id]=disp?disp.finalScore:((reviewSelected.aiScores&&reviewSelected.aiScores[c.id])||"");
      });
      var dispSc=calcScore(merged,matrix);
      var disputedPassed=dispSc?(!reviewSelected.autofail&&dispSc.pct>=85):reviewSelected.passed;
      var reviewerNotes=disputeState._reviewerNotes!==undefined?disputeState._reviewerNotes:(reviewSelected.reviewerNotes||"");
      var updated=Object.assign({},reviewSelected,{
        disputes:updatedDisputes,hasDisputes,
        finalScore:dispSc?dispSc.pct:reviewSelected.finalScore,
        disputedPassed,
        reviewed:true,
        reviewedBy:currentUser.name,
        reviewedAt:new Date().toISOString(),
        reviewerNotes:reviewerNotes,
      });
      if(updated.notionPageId){
        await updateTicketInNotion(updated.notionPageId,updated);
        // Also save reviewed status and reviewer notes
        await notionAPI("/v1/pages/"+updated.notionPageId,"PATCH",{properties:{
          "Reviewed":       {checkbox:true},
          "Reviewed By":    {rich_text:[{text:{content:currentUser.name}}]},
          "Reviewed At":    {rich_text:[{text:{content:updated.reviewedAt}}]},
          "Reviewer Notes": {rich_text:[{text:{content:reviewerNotes.slice(0,1990)}}]},
        }});
      }
      setTickets(function(ts){return ts.map(function(t){return t.id===updated.id?updated:t;});});
      setReviewSelected(updated);
      setDisputeState({});
      addToast(pending.length+" dispute"+(pending.length!==1?"s":"")+" saved");
    } catch(e){addToast("Save failed: "+e.message,"error");}
    setSavingDispute(false);
  }
  function addCtfEntry(section){
    if(!newCtfEntry.l1.trim()||!newCtfEntry.l2.trim())return;
    var entry={id:section+Date.now(),l1:newCtfEntry.l1.trim(),l2:newCtfEntry.l2.trim(),definition:newCtfEntry.definition.trim()};
    var updated=Object.assign({},ctf);updated[section]=ctf[section].concat([entry]);
    setCtf(updated);setNewCtfEntry({l1:"",l2:"",definition:""});
  }
  async function saveCtf(u){setCtfSaved(true);setTimeout(function(){setCtfSaved(false);},2000);addToast("CTF saved (local only)");}
  function removeCtfEntry(section,id){var updated=Object.assign({},ctf);updated[section]=ctf[section].filter(function(e){return e.id!==id;});setCtf(updated);}

          {/* Result detail modal */}
          {selectedResult&&(

              <div style={{...card,width:"100%",maxWidth:"600px",marginBottom:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>

                                </span>
                                <div>
                                  <div style={{fontSize:"13px",fontWeight:600,color:"var(--color-text-primary)",marginBottom:"2px"}}>{a.name}</div>
                                  <div style={{fontSize:"12px",color:"var(--color-text-secondary)",lineHeight:1.6}}>{a.note}</div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div>
                          <div style={{fontSize:"11px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"var(--color-text-secondary)",marginBottom:"12px"}}>Contact reason insight</div>
                          <div style={{fontSize:"12px",color:"var(--color-text-secondary)",lineHeight:1.7,marginBottom:"14px"}}>{ins.contactReasonInsight}</div>
                          {(ins.contactReasonBreakdown||[]).map(function(cr,i){
                            var tone=scoreTone(cr.passRate);
                            return(
                              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                                <span style={{fontSize:"12px",color:"var(--color-text-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"160px"}} title={cr.reason}>{cr.reason}</span>
                                <div style={{display:"flex",gap:"12px",alignItems:"center",flexShrink:0}}>
                                  <span style={{fontSize:"11px",color:"var(--color-text-secondary)"}}>{cr.tickets}t</span>
                                  <span style={{fontSize:"12px",fontWeight:700,color:tone.text,minWidth:"36px",textAlign:"right"}}>{cr.passRate}%</span>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {!ins&&!aiInsightsLoading&&!aiInsightsError&&(
                  <div style={{textAlign:"center",padding:"32px 20px",color:"var(--color-text-secondary)"}}>
                    <div style={{fontSize:"32px",marginBottom:"8px"}}>✦</div>
                    <p style={{margin:0,fontSize:"13px",fontWeight:500}}>Click "Generate insights" to get AI-powered analysis</p>
                    <p style={{margin:"4px 0 0",fontSize:"12px"}}>Claude will analyze your QA data and give leadership actionable recommendations</p>
                  </div>
                )}
              </div>
            );
          })()}
          {(function(){
            var fromVal=rptFrom.trim(),toVal=rptTo.trim();
            var filtered=tickets.filter(function(t){
              var created=(t.createdDate||"").slice(0,10);
              if(fromVal&&created&&created<fromVal)return false;
              if(toVal&&created&&created>toVal)return false;
              return true;
            });
            if(!filtered.length)return null;
            var allAgents=[...new Set(filtered.map(function(t){return t.agentName;}).filter(Boolean))].sort();
            var teamAvg=Math.round(filtered.reduce(function(s,t){return s+t.finalScore;},0)/filtered.length);
            var teamPass=Math.round(filtered.filter(function(t){return t.passed;}).length/filtered.length*100);
            var teamTone=scoreTone(teamAvg);
            function catLbl(val){if(!val||val==="NA")return null;var v=val.toUpperCase();if(v.startsWith("YES"))return "Pass";if(v.startsWith("PARTIAL"))return "Partial";if(v.startsWith("NO"))return "Miss";return null;}
            return(
              <div style={card}>
                <p style={{margin:"0 0 16px",fontWeight:600,fontSize:"15px"}}>Team Insight</p>
                {/* Team summary bar */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:"10px",marginBottom:"20px"}}>
                  {[
                    {label:"Team avg",val:teamAvg+"%",tone:teamTone},
                    {label:"Tickets",val:filtered.length,tone:null},
                    {label:"Pass rate",val:teamPass+"%",tone:scoreTone(teamPass)},
                    {label:"Autofails",val:filtered.filter(function(t){return t.autofail;}).length,tone:null},
                    {label:"Disputed",val:filtered.filter(function(t){return t.hasDisputes;}).length,tone:null},
                  ].map(function(m){
                    return <div key={m.label} style={{background:"var(--color-background-secondary)",borderRadius:"var(--border-radius-md)",padding:"12px 14px"}}>
                      <div style={{fontSize:"10px",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:"var(--color-text-secondary)",marginBottom:"4px"}}>{m.label}</div>
                      <div style={{fontSize:"22px",fontWeight:700,color:m.tone?m.tone.text:"var(--color-text-primary)"}}>{m.val}</div>
                    </div>;
                  })}
                </div>
                {/* Category performance */}
                <p style={{...sectionLabel,marginBottom:"10px"}}>Category performance</p>
                <div style={{marginBottom:"20px"}}>
                  {matrix.map(function(c){
                    var app=filtered.filter(function(t){var v=(t.scores&&t.scores[c.id])||"";return v&&v!=="NA";});
                    if(!app.length)return null;
                    var pass=app.filter(function(t){return catLbl((t.scores&&t.scores[c.id])||"")==="Pass";}).length;
                    var pct=Math.round(pass/app.length*100);
                    var tone=scoreTone(pct);
                    return <div key={c.id} style={{marginBottom:"10px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                        <span style={{fontSize:"12px",fontWeight:500}}>{c.label}</span>
                        <span style={{fontSize:"12px",fontWeight:700,color:tone.text}}>{pct}%</span>
                      </div>
                      <div style={{height:"5px",background:"var(--color-background-secondary)",borderRadius:"3px",overflow:"hidden"}}>
                        <div style={{height:"100%",width:pct+"%",background:tone.text,borderRadius:"3px"}}/>
                      </div>
                    </div>;
                  }).filter(Boolean)}
                </div>
                {/* Per-agent collapsible sections */}
                <p style={{...sectionLabel,marginBottom:"10px"}}>By agent</p>
                {allAgents.map(function(a){
                  var ats=filtered.filter(function(t){return t.agentName===a;});
                  return <AgentInsightRow key={a} a={a} ats={ats} matrix={matrix}
                    scoreTone={scoreTone} scoreColor={scoreColor} T={T}
                    resultBadge={resultBadge} sectionLabel={sectionLabel}/>;
                })}
              </div>
            );
          })()}
        </div>
      )}
      {/* ── MATRIX ── */}
      {view==="matrix"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
            <p style={{margin:0,fontSize:"13px",color:"var(--color-text-secondary)"}}>Edit scoring categories and autofail conditions.</p>
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              {matrixSaved&&<span style={{fontSize:"12px",color:"var(--color-text-success)"}}>Saved!</span>}
              <button onClick={function(){if(window.confirm("Reset to defaults?")){setMatrix(getDefaultMatrix());setAutofailList(DEFAULT_AUTOFAILS);}}} style={ghost}>Reset</button>
              <button onClick={saveMatrix} style={btnInfo}>Save matrix</button>
            </div>
          </div>
          {matrix.map(function(cat){
            return <div key={cat.id} style={card}>
              <div onClick={function(){setEditingCat(editingCat===cat.id?null:cat.id);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",userSelect:"none"}}>
                <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                  <span style={{fontSize:"14px",fontWeight:500}}>{cat.label}</span>
                  <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"var(--border-radius-md)",background:"var(--color-background-secondary)",color:"var(--color-text-secondary)"}}>max {cat.max}pt</span>
                </div>
                <span style={{fontSize:"14px",color:"var(--color-text-secondary)"}}>{editingCat===cat.id?"↑":"↓"}</span>
              </div>
              {editingCat===cat.id&&(
                <div style={{marginTop:"16px",borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:"16px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"10px",marginBottom:"12px"}}>
                    <div><label style={lbl}>Category name</label><input style={inp} value={cat.label} onChange={function(e){updateCatField(cat.id,"label",e.target.value);}}/></div>
                    <div><label style={lbl}>Max points</label><input style={{width:"80px"}} type="number" step="0.5" min="0" value={cat.max} onChange={function(e){updateCatField(cat.id,"max",parseFloat(e.target.value)||0);}}/></div>
                  </div>
                  <div style={{marginBottom:"14px"}}><label style={lbl}>What it measures</label><textarea style={ta("56px")} value={cat.whatItMeasures} onChange={function(e){updateCatField(cat.id,"whatItMeasures",e.target.value);}}/></div>
                  <p style={sectionLabel}>Score levels</p>
                  {cat.levels.map(function(lvl,lvlIdx){
                    return <div key={lvlIdx} style={{border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-md)",marginBottom:"6px",padding:"10px 12px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
                        <div><label style={lbl}>Level</label><input value={lvl.level} onChange={function(e){updateLevelField(cat.id,lvlIdx,"level",e.target.value);}} style={{width:"100%",boxSizing:"border-box"}}/></div>
                        <div><label style={lbl}>Points</label><input type="number" step="0.5" value={lvl.points!=null?lvl.points:""} onChange={function(e){updateLevelField(cat.id,lvlIdx,"points",e.target.value===""?null:parseFloat(e.target.value));}} style={{width:"100px"}}/></div>
                      </div>
                      <label style={lbl}>Definition</label>
                      <textarea style={ta("48px")} value={lvl.definition} onChange={function(e){updateLevelField(cat.id,lvlIdx,"definition",e.target.value);}}/>
                    </div>;
                  })}
                </div>
              )}
            </div>;
          })}
          <div style={card}>
            <p style={{margin:"0 0 12px",fontWeight:500,fontSize:"14px"}}>Autofail conditions</p>
            {autofailList.map(function(af,i){
              return <div key={i} style={{display:"flex",gap:"8px",alignItems:"flex-start",marginBottom:"8px"}}>
                <textarea style={{...ta("44px"),flex:1}} value={af} onChange={function(e){var u=autofailList.slice();u[i]=e.target.value;setAutofailList(u);}}/>
                <button onClick={function(){setAutofailList(autofailList.filter(function(_,j){return j!==i;}));}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"var(--color-text-danger)",padding:"6px 4px"}}>Remove</button>
              </div>;
            })}
            <div style={{display:"flex",gap:"8px",marginTop:"8px"}}>
              <input style={{flex:1}} placeholder="Add new autofail..." value={newAutofail} onChange={function(e){setNewAutofail(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"&&newAutofail.trim()){setAutofailList(autofailList.concat([newAutofail.trim()]));setNewAutofail("");}}}/>
              <button onClick={function(){if(newAutofail.trim()){setAutofailList(autofailList.concat([newAutofail.trim()]));setNewAutofail("");}}} style={btnInfo}>Add</button>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:"4px"}}><button onClick={saveMatrix} style={btnInfo}>Save matrix</button></div>
        </div>
      )}

      {/* ── CTF ── */}
      {view==="ctf"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
            <p style={{margin:0,fontSize:"13px",color:"var(--color-text-secondary)"}}>Define the CTF taxonomy for AI scoring.</p>
            <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
              {ctfSaved&&<span style={{fontSize:"12px",color:"var(--color-text-success)"}}>Saved!</span>}
              <button onClick={function(){saveCtf(ctf);}} style={btnInfo}>Save CTF</button>
            </div>
          </div>
          <div style={{display:"flex",gap:"3px",marginBottom:"12px",background:"var(--color-background-secondary)",padding:"3px",borderRadius:"var(--border-radius-md)",width:"fit-content"}}>
            {[["contactReasons","Contact reasons"],["products","Products"],["resolutions","Resolutions"]].map(function(p){
              return <button key={p[0]} style={tabStyle(ctfTab===p[0])} onClick={function(){setCtfTab(p[0]);setNewCtfEntry({l1:"",l2:"",definition:"",});}}>{p[1]}</button>;
            })}
          </div>
          <div style={card}>
            {ctf[ctfTab].length===0?<p style={{fontSize:"13px",color:"var(--color-text-secondary)",margin:0}}>No entries yet.</p>:(
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"12px"}}>
                <thead><tr style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>{["L1","L2","Definition",""].map(function(h){return <th key={h} style={{textAlign:"left",padding:"5px 8px",color:"var(--color-text-secondary)",fontWeight:400}}>{h}</th>;})}</tr></thead>
                <tbody>{ctf[ctfTab].map(function(entry){
                  return <tr key={entry.id} style={{borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                    <td style={{padding:"6px 8px"}}><input value={entry.l1} onChange={function(e){var u=Object.assign({},ctf);u[ctfTab]=ctf[ctfTab].map(function(x){return x.id===entry.id?Object.assign({},x,{l1:e.target.value}):x;});setCtf(u);}} style={{width:"100%",boxSizing:"border-box",fontSize:"12px"}}/></td>
                    <td style={{padding:"6px 8px"}}><input value={entry.l2} onChange={function(e){var u=Object.assign({},ctf);u[ctfTab]=ctf[ctfTab].map(function(x){return x.id===entry.id?Object.assign({},x,{l2:e.target.value}):x;});setCtf(u);}} style={{width:"100%",boxSizing:"border-box",fontSize:"12px"}}/></td>
                    <td style={{padding:"6px 8px"}}><input value={entry.definition} onChange={function(e){var u=Object.assign({},ctf);u[ctfTab]=ctf[ctfTab].map(function(x){return x.id===entry.id?Object.assign({},x,{definition:e.target.value}):x;});setCtf(u);}} style={{width:"100%",boxSizing:"border-box",fontSize:"12px"}}/></td>
                    <td style={{padding:"6px 8px"}}><button onClick={function(){removeCtfEntry(ctfTab,entry.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:"12px",color:"var(--color-text-danger)"}}>Remove</button></td>
                  </tr>;
                })}</tbody>
              </table>
            )}
          </div>
          <div style={card}>
            <p style={{margin:"0 0 10px",fontWeight:500,fontSize:"13px"}}>Add entry</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr auto",gap:"8px",alignItems:"end"}}>
              <div><label style={lbl}>L1</label><input style={inp} value={newCtfEntry.l1} onChange={function(e){setNewCtfEntry(function(n){return Object.assign({},n,{l1:e.target.value});});}}/></div>
              <div><label style={lbl}>L2</label><input style={inp} value={newCtfEntry.l2} onChange={function(e){setNewCtfEntry(function(n){return Object.assign({},n,{l2:e.target.value});});}}/></div>
              <div><label style={lbl}>Definition</label><input style={inp} value={newCtfEntry.definition} onChange={function(e){setNewCtfEntry(function(n){return Object.assign({},n,{definition:e.target.value});});}}/></div>
              <button onClick={function(){addCtfEntry(ctfTab);}} style={btnInfo}>Add</button>
            </div>
          </div>
        </div>
      )}

      {/* Toasts */}
      <div style={{position:"fixed",bottom:"24px",right:"24px",display:"flex",flexDirection:"column",gap:"8px",zIndex:9999,pointerEvents:"none"}}>
        {toasts.map(function(t){
          var tone=t.type==="error"?T.red:t.type==="warning"?T.amber:T.green;
          return <div key={t.id} style={{background:tone.bg,border:"1px solid "+tone.border,borderLeft:"3px solid "+tone.text,borderRadius:"var(--border-radius-md)",padding:"10px 18px",fontSize:"12px",fontWeight:600,color:tone.text,animation:"toastIn 0.15s ease",whiteSpace:"nowrap"}}>{t.msg}</div>;
        })}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
